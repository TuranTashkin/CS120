<!DOCTYPE html>
<html>
<head>
    <title>JSON Part 1</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
    </style>
</head>
<body>
    <h2>Part 1: Create JSON</h2>
    <div id="output"></div>

    <script>
        // JSON object with 8+ songs
        const songList = {
            songs: [
                {
                    title: "Do I Wanna Know?",
                    artist: "Arctic Monkeys",
                    year: 2013,
                    genres: ["rock"]
                },
                {
                    title: "Sweater Weather",
                    artist: "The Neighbourhood",
                    year: 2012,
                    genres: ["rock"]
                },
                {
                    title: "Sweet Child O' Mine",
                    artist: "Guns N' Roses",
                    year: 1987,
                    genres: ["rock", "metal"]
                },
                {
                    title: "Youngblood",
                    artist: "5 Seconds of Summer",
                    year: 2018,
                    genres: ["pop"]
                },
                {
                    title: "Jolene",
                    artist: "Dolly Parton",
                    year: 1973,
                    genres: ["country"]
                },
                {
                    title: "Nothing Breaks Like A Heart",
                    artist: "Miley Cyrus",
                    year: 2018,
                    genres: ["pop"]
                },
                {
                    title: "Thriller",
                    artist: "Michael Jackson",
                    year: 1982,
                    genres: ["pop", "rock"]
                },
                {
                    title: "Everyone's A Star!",
                    artist: "5 Seconds of Summer",
                    year: 2025,
                    genres: ["pop", "rock"]
                }
            ]
        };

        // Convert to string and display
        const jsonString = JSON.stringify(songList, null, 2);
        document.getElementById("output").innerHTML = `<pre>${jsonString}</pre>`;
    </script>
</body>
</html>
